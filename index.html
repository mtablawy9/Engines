<!DOCTYPE html>
<html>

<head>
    <title>Engine System</title>

    <style>
        body {
            display: flex;
            font-family: Arial;
        }

        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            padding: 10px;
        }

        .group {
            background: #34495e;
            margin: 5px 0;
            padding: 8px;
            cursor: pointer;
        }

        .engine {
            padding: 5px 15px;
            background: #3f5c75;
            cursor: pointer;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>

<body>

<!-- LEFT -->
<div class="sidebar" id="sidebar"></div>

<!-- RIGHT -->
<div class="main">

    <h2>Add Engine</h2>

    <input id="desc" placeholder="Description (Engine Type)">
    <input id="pn" placeholder="P/N">
    <input id="sn" placeholder="S/N">
    <input id="bs" placeholder="Build Specs">

    <button onclick="addEngine()">Add</button>

    <div id="details"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

function save() {
    localStorage.setItem("data", JSON.stringify(data));
}

function addEngine() {

    let desc = document.getElementById("desc").value;
    let pn = document.getElementById("pn").value;
    let sn = document.getElementById("sn").value;
    let bs = document.getElementById("bs").value;

    if (!desc || !pn || !sn || !bs) return;

    let group = data.find(d => d.description === desc);

    if (!group) {
        group = { description: desc, engines: [] };
        data.push(group);
    }

    group.engines.push({ pn, sn, bs });

    save();
    render();

    document.getElementById("desc").value = "";
    document.getElementById("pn").value = "";
    document.getElementById("sn").value = "";
    document.getElementById("bs").value = "";
}

function render() {

    let sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = "";

    data.forEach((group, gIndex) => {

        let div = document.createElement("div");
        div.className = "group";
        div.innerText = group.description;

        div.onclick = function () {
            toggleGroup(gIndex);
        };

        sidebar.appendChild(div);

        let engineList = document.createElement("div");
        engineList.id = "group" + gIndex;
        engineList.style.display = "none";

        group.engines.forEach((e, eIndex) => {

            let eng = document.createElement("div");
            eng.className = "engine";
            eng.innerText = e.sn;

            eng.onclick = function (event) {
                event.stopPropagation();
                showDetails(gIndex, eIndex);
            };

            engineList.appendChild(eng);
        });

        sidebar.appendChild(engineList);
    });
}

function toggleGroup(index) {
    let div = document.getElementById("group" + index);

    div.style.display = div.style.display === "none" ? "block" : "none";
}

function showDetails(gIndex, eIndex) {

    let e = data[gIndex].engines[eIndex];

    document.getElementById("details").innerHTML = `
        <h3>Engine Details</h3>
        <p><b>Description:</b> ${data[gIndex].description}</p>
        <p><b>P/N:</b> ${e.pn}</p>
        <p><b>S/N:</b> ${e.sn}</p>
        <p><b>Build Specs:</b> ${e.bs}</p>
    `;
}

render();

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>Engine Management System</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 200px;
            background: #2c3e50;
            color: white;
            padding: 10px;
            overflow-y: auto;
        }

        .engine-item {
            background: #34495e;
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #eee;
        }

        .btn-delete {
            background: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn-edit {
            background: orange;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Engines</h3>
        <div id="engineList"></div>
    </div>

    <!-- Main -->
    <div class="main">

        <h2>Engine Management</h2>

        <input id="pn" placeholder="P/N">
        <input id="sn" placeholder="S/N">
        <input id="bs" placeholder="Build Specs">

        <button onclick="addEngine()">Add</button>

        <br>

        <input id="search" placeholder="Search P/N or S/N" onkeyup="filterEngines()">

        <button onclick="exportCSV()">Export Excel</button>

        <table>
            <thead>
                <tr>
                    <th>P/N</th>
                    <th>S/N</th>
                    <th>BS</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="engineTable"></tbody>
        </table>

    </div>

    <script>

        let engines = JSON.parse(localStorage.getItem("engines")) || [];

        function saveData() {
            localStorage.setItem("engines", JSON.stringify(engines));
        }

        function addEngine() {

            let pn = document.getElementById("pn").value;
            let sn = document.getElementById("sn").value;
            let bs = document.getElementById("bs").value;

            if (!pn || !sn || !bs) return;

            engines.push({ pn, sn, bs });

            saveData();

            updateUI();

            pn = sn = bs = "";
            document.getElementById("pn").value = "";
            document.getElementById("sn").value = "";
            document.getElementById("bs").value = "";
        }

        function updateUI() {
            updateList();
            updateTable();
        }

        function updateList() {
            let list = document.getElementById("engineList");
            list.innerHTML = "";

            engines.forEach((e, i) => {

                let div = document.createElement("div");
                div.className = "engine-item";
                div.innerText = e.sn;

                div.onclick = () => showDetails(i);

                list.appendChild(div);
            });
        }

        function updateTable(filtered = engines) {
            let table = document.getElementById("engineTable");
            table.innerHTML = "";

            filtered.forEach((e, i) => {

                let row = `
                    <tr>
                        <td>${e.pn}</td>
                        <td>${e.sn}</td>
                        <td>${e.bs}</td>
                        <td>
                            <button class="btn-edit" onclick="editEngine(${i})">Edit</button>
                            <button class="btn-delete" onclick="deleteEngine(${i})">Delete</button>
                        </td>
                    </tr>
                `;

                table.innerHTML += row;
            });
        }

        function deleteEngine(index) {
            engines.splice(index, 1);
            saveData();
            updateUI();
        }

        function editEngine(index) {

            let e = engines[index];

            document.getElementById("pn").value = e.pn;
            document.getElementById("sn").value = e.sn;
            document.getElementById("bs").value = e.bs;

            deleteEngine(index);
        }

        function filterEngines() {

            let value = document.getElementById("search").value.toLowerCase();

            let filtered = engines.filter(e =>
                e.pn.toLowerCase().includes(value) ||
                e.sn.toLowerCase().includes(value)
            );

            updateTable(filtered);
        }

        function showDetails(index) {
            alert(
                "P/N: " + engines[index].pn +
                "\nS/N: " + engines[index].sn +
                "\nBS: " + engines[index].bs
            );
        }

        function exportCSV() {

            let csv = "P/N,S/N,BS\n";

            engines.forEach(e => {
                csv += `${e.pn},${e.sn},${e.bs}\n`;
            });

            let blob = new Blob([csv], { type: 'text/csv' });
            let a = document.createElement("a");

            a.href = URL.createObjectURL(blob);
            a.download = "engines.csv";

            a.click();
        }

        updateUI();

    </script>

</body>

</html>

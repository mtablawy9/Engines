<!DOCTYPE html>
<html>
<head>
<title>Engine System Pro</title>

<style>
body { display: flex; font-family: Arial; }

.sidebar {
    width: 250px;
    background: #2c3e50;
    color: white;
    padding: 10px;
}

.group { background: #34495e; padding: 8px; margin: 5px; cursor: pointer; }
.engine { padding: 5px 15px; background: #3f5c75; cursor: pointer; }

.main { flex: 1; padding: 20px; }

input, button {
    padding: 6px;
    margin: 4px;
}

.box {
    background: #eee;
    padding: 10px;
    margin: 10px 0;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">

<h2>Add Engine</h2>

<input id="desc" placeholder="Description">
<input id="pn" placeholder="P/N">
<input id="sn" placeholder="S/N">
<input id="bs" placeholder="BS">

<button onclick="addEngine()">Add</button>

<div id="details"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];
let currentEngine = null;

function save() {
    localStorage.setItem("data", JSON.stringify(data));
}

// ✅ Add Engine
function addEngine() {
    let desc = descI.value;
    let pn = pnI.value;
    let sn = snI.value;
    let bs = bsI.value;

    if (!desc || !pn || !sn || !bs) return;

    let group = data.find(d => d.description === desc);

    if (!group) {
        group = { description: desc, engines: [] };
        data.push(group);
    }

    group.engines.push({
        pn, sn, bs,
        trends: []
    });

    save();
    render();

    descI.value = pnI.value = snI.value = bsI.value = "";
}

// ✅ Sidebar
function render() {

    sidebar.innerHTML = "";

    data.forEach((g, gi) => {

        let gDiv = document.createElement("div");
        gDiv.className = "group";
        gDiv.innerText = g.description;
        gDiv.onclick = () => toggle(gi);
        sidebar.appendChild(gDiv);

        let list = document.createElement("div");
        list.id = "g" + gi;
        list.style.display = "none";

        g.engines.forEach((e, ei) => {

            let eDiv = document.createElement("div");
            eDiv.className = "engine";
            eDiv.innerText = e.sn;

            eDiv.onclick = (ev) => {
                ev.stopPropagation();
                showEngine(gi, ei);
            };

            list.appendChild(eDiv);
        });

        sidebar.appendChild(list);
    });
}

function toggle(i) {
    let el = document.getElementById("g" + i);
    el.style.display = el.style.display === "none" ? "block" : "none";
}

// ✅ Show Engine
function showEngine(gi, ei) {

    currentEngine = data[gi].engines[ei];

    let open = 0;
    let closed = 0;

    currentEngine.trends.forEach(t => {
        t.actions.forEach(a => {
            if (a.response) closed++;
            else open++;
        });
    });

    details.innerHTML = `
        <h3>Engine Details</h3>
        <p>P/N: ${currentEngine.pn}</p>
        <p>S/N: ${currentEngine.sn}</p>
        <p>BS: ${currentEngine.bs}</p>

        <h4>Dashboard</h4>
        <p>Open Actions: ${open}</p>
        <p>Closed Actions: ${closed}</p>

        <h3>Add Trend</h3>
        <input id="trendType" placeholder="Trend Type">
        <button onclick="addTrend()">Add Trend</button>

        <div id="trendList"></div>
    `;

    renderTrends();
}

// ✅ Add Trend
function addTrend() {
    let type = trendType.value;
    if (!type) return;

    currentEngine.trends.push({
        type,
        actions: []
    });

    save();
    renderTrends();
}

// ✅ Render Trends
function renderTrends() {

    let div = trendList;
    div.innerHTML = "";

    currentEngine.trends.forEach((t, ti) => {

        let html = `<div class="box">
            <h4>${t.type}</h4>

            <input id="action${ti}" placeholder="Action">
            <input id="response${ti}" placeholder="Response">

            <button onclick="addAction(${ti})">Add</button>
        `;

        t.actions.forEach(a => {

            let status = a.response ? "✅ CLOSED" : "❌ OPEN";

            html += `
                <p>
                [${a.date}]
                ${a.action} → ${a.response || "NO RESPONSE"}
                (${status})
                </p>
            `;
        });

        html += "</div>";

        div.innerHTML += html;
    });
}

// ✅ Add Action
function addAction(ti) {

    let action = document.getElementById("action" + ti).value;
    let response = document.getElementById("response" + ti).value;

    if (!action) return;

    if (!response) {
        alert("❌ لازم Response عشان يقفل");
        return;
    }

    let date = new Date().toLocaleDateString();

    currentEngine.trends[ti].actions.push({
        action,
        response,
        date
    });

    save();
    renderTrends();
}

render();

</script>

</body>
</html>
``

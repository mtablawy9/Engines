<!DOCTYPE html>
<html>
<head>
<title>Engine System</title>

<style>
body { display: flex; font-family: Arial; }

.sidebar { width: 250px; background: #2c3e50; color: white; padding: 10px; }

.group { background: #34495e; margin: 5px; padding: 8px; cursor: pointer; }

.engine { padding: 5px 15px; background: #3f5c75; cursor: pointer; }

.main { flex: 1; padding: 20px; }

input, button { padding: 6px; margin: 4px; }
.box { background: #eee; padding: 10px; margin: 10px 0; }

</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">

<h2>Add Engine</h2>

<input id="desc" placeholder="Description">
<input id="pn" placeholder="P/N">
<input id="sn" placeholder="S/N">
<input id="bs" placeholder="BS">

<button onclick="addEngine()">Add</button>

<div id="details"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data")) || [];

let currentEngine = null;

function save() {
    localStorage.setItem("data", JSON.stringify(data));
}

function addEngine() {

    let desc = descI.value;
    let pn = pnI.value;
    let sn = snI.value;
    let bs = bsI.value;

    if (!desc || !pn || !sn || !bs) return;

    let group = data.find(d => d.description === desc);

    if (!group) {
        group = { description: desc, engines: [] };
        data.push(group);
    }

    group.engines.push({ pn, sn, bs, trends: [] });

    save();
    render();

    descI.value = pnI.value = snI.value = bsI.value = "";
}

function render() {

    sidebar.innerHTML = "";

    data.forEach((g, gi) => {

        let gDiv = document.createElement("div");
        gDiv.className = "group";
        gDiv.innerText = g.description;

        gDiv.onclick = () => toggleGroup(gi);

        sidebar.appendChild(gDiv);

        let engList = document.createElement("div");
        engList.id = "g" + gi;
        engList.style.display = "none";

        g.engines.forEach((e, ei) => {

            let eDiv = document.createElement("div");
            eDiv.className = "engine";
            eDiv.innerText = e.sn;

            eDiv.onclick = (ev) => {
                ev.stopPropagation();
                showEngine(gi, ei);
            };

            engList.appendChild(eDiv);
        });

        sidebar.appendChild(engList);
    });
}

function toggleGroup(i) {
    let el = document.getElementById("g" + i);
    el.style.display = el.style.display === "none" ? "block" : "none";
}

function showEngine(gi, ei) {

    currentEngine = data[gi].engines[ei];

    let html = `
        <h3>Engine</h3>

        <p>P/N: ${currentEngine.pn}</p>
        <p>S/N: ${currentEngine.sn}</p>
        <p>BS: ${currentEngine.bs}</p>

        <h3>Add Trend</h3>

        <input id="trendType" placeholder="Trend Type">
        <button onclick="addTrend()">Add Trend</button>

        <div id="trendList"></div>
    `;

    details.innerHTML = html;

    renderTrends();
}

function addTrend() {

    let type = document.getElementById("trendType").value;

    if (!type) return;

    currentEngine.trends.push({ type, actions: [] });

    save();
    renderTrends();
}

function renderTrends() {

    let div = document.getElementById("trendList");
    div.innerHTML = "";

    currentEngine.trends.forEach((t, ti) => {

        let trendDiv = document.createElement("div");
        trendDiv.className = "box";

        let html = `
            <h4>${t.type}</h4>

            <input id="action${ti}" placeholder="Action">
            <input id="response${ti}" placeholder="Response">

            <button onclick="addAction(${ti})">Add</button>
        `;

        t.actions.forEach((a, ai) => {

            let status = a.response ? "✅ Closed" : "❌ Open";

            html += `
                <p>
                - ${a.action} → ${a.response || "No response"} (${status})
                </p>
            `;
        });

        trendDiv.innerHTML = html;

        div.appendChild(trendDiv);
    });
}

function addAction(ti) {

    let action = document.getElementById("action" + ti).value;
    let response = document.getElementById("response" + ti).value;

    if (!action) return;

    if (!response) {
        alert("❌ لازم تضيف Response عشان تقفل الأكشن");
        return;
    }

    currentEngine.trends[ti].actions.push({ action, response });

    save();
    renderTrends();
}

render();

</script>

</body>
</html>
